name: cockat
description: "What should I drink today? - Cocktail recommendation app based on your ingredients"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Backend
  supabase_flutter: ^2.8.3
  flutter_dotenv: ^5.2.1

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.4
  collection: ^1.18.0

  # Image Caching
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Carousel
  carousel_slider: ^5.0.0

  # Navigation
  go_router: ^14.8.1

  # Utilities - URL Launcher
  url_launcher: ^6.3.1

  # Image Picker
  image_picker: ^1.1.2

  # Firebase
  firebase_core: ^3.8.1
  firebase_analytics: ^11.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logos/cockat.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logos/cockat.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/logos/
